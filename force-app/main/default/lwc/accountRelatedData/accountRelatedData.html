<template>
    <lightning-card title="Account Contact & Opportunity Viewer" icon-name="standard:account">
        <div class="slds-p-around_medium">
            
            <lightning-combobox
                name="account"
                label="Select Account"
                value={selectedAccountId}
                placeholder="-- Select Account --"
                options={accountOptions}
                onchange={handleAccountChange}
                class="slds-m-bottom_medium"
            ></lightning-combobox>

            <template if:true={isLoading}>
                <div class="slds-align_absolute-center slds-m-vertical_large">
                    <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
                </div>
            </template>

            <template if:false={isLoading}>
                <lightning-layout multiple-rows="true">
                    <template for:each={sections} for:item="section" for:index="index">
                        <lightning-layout-item key={section.key} size="12" large-device-size="6" padding="around-small">
                            <lightning-card title={section.displayTitle} icon-name={section.icon}>
                                <template if:true={section.pagedRecords.length}>
                                    <lightning-datatable
                                        key-field="Id"
                                        data={section.pagedRecords}
                                        columns={section.columns}
                                        onrowaction={handleRowAction}
                                        onsave={handleSave}
                                        draft-values={section.draftValues}
                                        hide-checkbox-column
                                    ></lightning-datatable>

                                    <div class="slds-grid slds-grid_align-spread slds-p-top_small">
                                        <lightning-button-group>
                                            <lightning-button
                                                label="Previous"
                                                onclick={handlePageChange}
                                                data-section={section.key}
                                                data-direction="previous"
                                                disabled={section.isFirstPage}
                                            ></lightning-button>
                                            <lightning-button
                                                label="Next"
                                                onclick={handlePageChange}
                                                data-section={section.key}
                                                data-direction="next"
                                                disabled={section.isLastPage}
                                            ></lightning-button>
                                        </lightning-button-group>
                                        <span class="slds-align-middle slds-text-body_small">
                                            Page {section.currentPage} of {section.totalPages}
                                        </span>
                                    </div>

                                </template>
                                <template if:false={section.pagedRecords.length}>
                                    <p class="slds-p-horizontal_small">No {section.key} found.</p>
                                </template>
                            </lightning-card>
                        </lightning-layout-item>
                    </template>
                </lightning-layout>
            </template>
        </div>
    </lightning-card>
</template>
