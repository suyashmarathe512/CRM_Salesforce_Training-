<template>
    <div class="component-wrapper-v5">
        <article class="slds-card" style="display: flex; flex-direction: column; min-height: 85vh;">
            <div class="slds-card__header slds-grid" style="background-color: #f3f3f3; border-bottom: 1px solid #dddbda; padding: 0.75rem 1rem; height: 60px; flex-shrink: 0;">
                <header class="slds-media slds-media_center slds-has-flexi-truncate">
                    <div class="slds-media__figure">
                        <lightning-icon icon-name="standard:account" size="medium"></lightning-icon>
                    </div>
                    <div class="slds-media__body">
                        <h2 class="slds-card__header-title">
                            <span class="slds-text-heading_medium">Account Contact & Opportunity Viewer</span>
                        </h2>
                    </div>
                </header>
            </div>
            <div class="slds-card__body slds-card__body_inner" style="flex-grow: 1; padding: 20px;">
                <lightning-combobox
                    name="account"
                    label="Select Account"
                    value={selectedAccountId}
                    placeholder="-- Select Account -- "
                    options={accountOptions}
                    onchange={handleAccountChange}
                    class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3 slds-m-bottom_medium"
                ></lightning-combobox>
                <template if:true={isLoading}>
                    <div class="slds-align_absolute-center slds-m-vertical_large">
                        <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
                    </div>
                </template>
                <template if:false={isLoading}>
                    <lightning-layout multiple-rows="true">
                        <lightning-layout-item size="12" large-device-size="6" padding="around-small">
                            <article class="slds-card slds-grow" style="height: 100%;">
                                <div class="slds-card__header slds-grid" style="background-color: #f3f3f3; border-bottom: 1px solid #dddbda; padding: 0.75rem 1rem;">
                                    <header class="slds-media slds-media_center slds-has-flexi-truncate">
                                        <div class="slds-media__figure">
                                            <lightning-icon icon-name="standard:contact" size="small"></lightning-icon>
                                        </div>
                                        <div class="slds-media__body">
                                            <h2 class="slds-card__header-title">
                                                <span class="slds-text-heading_small">{contactsDisplayTitle}</span>
                                            </h2>
                                        </div>
                                    </header>
                                </div>
                                <div class="slds-card__body" style="padding: 0;">
                                    <template if:true={contactsPagedRecords.length}>
                                        <c-custom-inline-edit-datatable
                                            key-field="Id"
                                            data={contactsPagedRecords}
                                            columns={contactsColumns}
                                            draft-values={contactsDraftValues}
                                            onsave={handleContactsSave}
                                            onrowaction={handleContactsRowAction}
                                            hide-checkbox-column>
                                        </c-custom-inline-edit-datatable>
                                    </template>
                                    <template if:false={contactsPagedRecords.length}>
                                        <p class="slds-p-around_small">No Contacts found.</p>
                                    </template>
                                </div>
                            </article>
                        </lightning-layout-item>
                        <lightning-layout-item size="12" large-device-size="6" padding="around-small">
                            <article class="slds-card slds-grow" style="height: 100%;">
                                <div class="slds-card__header slds-grid" style="background-color: #f3f3f3; border-bottom: 1px solid #dddbda; padding: 0.75rem 1rem;">
                                    <header class="slds-media slds-media_center slds-has-flexi-truncate">
                                        <div class="slds-media__figure">
                                            <lightning-icon icon-name="standard:opportunity" size="small"></lightning-icon>
                                        </div>
                                        <div class="slds-media__body">
                                            <h2 class="slds-card__header-title">
                                                <span class="slds-text-heading_small">{opportunitiesDisplayTitle}</span>
                                            </h2>
                                        </div>
                                    </header>
                                </div>
                                <div class="slds-card__body" style="padding: 0;">
                                    <template if:true={opportunitiesPagedRecords.length}>
                                        <c-custom-inline-edit-datatable
                                            key-field="Id"
                                            data={opportunitiesPagedRecords}
                                            columns={opportunitiesColumns}
                                            draft-values={opportunitiesDraftValues}
                                            onsave={handleOpportunitiesSave}
                                            onrowaction={handleOpportunitiesRowAction}
                                            hide-checkbox-column>
                                        </c-custom-inline-edit-datatable>
                                    </template>
                                    <template if:false={opportunitiesPagedRecords.length}>
                                        <p class="slds-p-around_small">No Opportunities found.</p>
                                    </template>
                                </div>
                            </article>
                        </lightning-layout-item>
                    </lightning-layout>
                </template>
            </div>
            <template if:false={isLoading}>
                <div class="slds-card__footer" style="background-color: #f3f3f3; border-top: 1px solid #dddbda; padding: 0.75rem 1rem; overflow: hidden; min-height: 60px; max-height: 60px; flex-shrink: 0;">
                    <div style="display: flex; width: 100%; gap: 0.5rem;">
                        <div style="width: 50%; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center;">
                            <span class="slds-text-body_small" style="white-space: nowrap;">
                                Contacts Page {contactsCurrentPage} of {contactsTotalPages}
                            </span>
                            <lightning-button-group>
                                <lightning-button
                                    label="Previous"
                                    onclick={handleContactsPageChange}
                                    data-direction="previous"
                                    disabled={contactsIsFirstPage}
                                ></lightning-button>
                                <lightning-button
                                    label="Next"
                                    onclick={handleContactsPageChange}
                                    data-direction="next"
                                    disabled={contactsIsLastPage}
                                ></lightning-button>
                            </lightning-button-group>
                        </div>
                        <div style="width: 50%; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center;">
                            <span class="slds-text-body_small" style="white-space: nowrap;">
                                Opportunities Page {opportunitiesCurrentPage} of {opportunitiesTotalPages}
                            </span>
                            <lightning-button-group>
                                <lightning-button
                                    label="Previous"
                                    onclick={handleOpportunitiesPageChange}
                                    data-direction="previous"
                                    disabled={opportunitiesIsFirstPage}
                                ></lightning-button>
                                <lightning-button
                                    label="Next"
                                    onclick={handleOpportunitiesPageChange}
                                    data-direction="next"
                                    disabled={opportunitiesIsLastPage}
                                ></lightning-button>
                            </lightning-button-group>
                        </div>
                    </div>
                </div>
            </template>
        </article>
    </div>
</template>
