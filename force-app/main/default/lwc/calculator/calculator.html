<template>
  <section class="calc-card" onkeydown={handleKeydown} tabindex="0" aria-label="Calculator">
    <div class="display-wrap">
      <input class="display" type="text" value={result} readonly aria-label="Result" />
    </div>

    <div class="grid">
      <button class="btn btn-util" title="Clear" onclick={clearInput}>C</button>
      <button class="btn btn-util" title="Backspace" onclick={backspace}>⌫</button>
      <button class="btn btn-util" value="%" onclick={handleClick}>%</button>
      <button class="btn btn-op" value="/" onclick={handleClick}>÷</button>

      <button class="btn" value="7" onclick={handleClick}>7</button>
      <button class="btn" value="8" onclick={handleClick}>8</button>
      <button class="btn" value="9" onclick={handleClick}>9</button>
      <button class="btn btn-op" value="*" onclick={handleClick}>×</button>

      <button class="btn" value="4" onclick={handleClick}>4</button>
      <button class="btn" value="5" onclick={handleClick}>5</button>
      <button class="btn" value="6" onclick={handleClick}>6</button>
      <button class="btn btn-op" value="-" onclick={handleClick}>−</button>

      <button class="btn" value="1" onclick={handleClick}>1</button>
      <button class="btn" value="2" onclick={handleClick}>2</button>
      <button class="btn" value="3" onclick={handleClick}>3</button>
      <button class="btn btn-op" value="+" onclick={handleClick}>+</button>

      <button class="btn span-2" value="0" onclick={handleClick}>0</button>
      <button class="btn" value="." onclick={handleClick}>.</button>
      <button class="btn btn-eq" onclick={calculateResult}>=</button>
    </div>
  </section>
</template>
