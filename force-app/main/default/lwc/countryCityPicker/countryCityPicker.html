<template>
    <lightning-card>
    <div class="slds-card__header slds-grid" style="background-color: #f3f3f3; border-bottom: 1px solid #dddbda; padding: 0.75rem 1rem;">
                <div class="slds-media__body">
                    <h2 class="slds-card__header-title">
                        <span class="slds-text-heading_large">Country-City Dependent Picklist</span>
                    </h2>
                </div>
        </div>
        <div class="slds-m-around_medium" style ="max-width: 800px; margin: 0 auto; background-color: #f3f6fb; padding: 20px; border-radius: 10px;">  
            <lightning-combobox
                name="country"
                label="Country"
                placeholder="Select a Country"
                value={selectedCountry}
                onchange={handleCountryChange}
                options={countryOptions}>
            </lightning-combobox>
            <lightning-combobox
                class="slds-m-top_medium"
                name="city"
                label="City"
                placeholder="Select a City"
                value={selectedCity}
                onchange={handleCityChange}
                options={cityOptions}
                disabled={isCityDisabled}> 
            </lightning-combobox>
        </div>
    </lightning-card>
</template>
