<template>
    <lightning-card title="Account Records" icon-name="standard:account">
        <template if:true={accounts}>
            <lightning-datatable
                key-field="Id"
                data={accounts}
                columns={columns}
                hide-checkbox-column="true"
                show-row-number-column="true"
            ></lightning-datatable>
        </template>
    </lightning-card>
</template>
