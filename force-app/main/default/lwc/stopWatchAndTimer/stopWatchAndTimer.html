<template>
    <lightning-card class="slds-card_boundary" title="Stopwatch and Timer">
        <div class="slds-grid slds-grid_vertical-align-center slds-p-around_medium">
            <div class="slds-col slds-size_1-of-1 display">
                <span class="time">{elapsedTime}</span>
                <span class="mode" lwc:if={mode}> ({mode})</span>
            </div>
            <div class="slds-col slds-size_1-of-1 timer-input">
                <lightning-input label="Timer Duration (seconds)" type="number" value={timerInputValue} onchange={handleTimerInputChange} class="slds-input"></lightning-input>
            </div>
            <div class="slds-col slds-size_1-of-1 buttons">
                <lightning-button label={startStopwatchLabel} onclick={startStopwatch} disabled={isStopwatchDisabled} class="slds-button slds-button_brand"></lightning-button>
                <lightning-button label={startTimerLabel} onclick={startTimer} disabled={isTimerDisabled} class="slds-button slds-button_brand"></lightning-button>
                <lightning-button label="Reset" onclick={reset} class="slds-button slds-button_neutral"></lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
