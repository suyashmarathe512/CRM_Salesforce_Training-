<template>
    <lightning-card class="slds-theme_shade">
        <lightning-icon icon-name="utility:clock" slot="title"></lightning-icon>
        <span slot="title">   Stopwatch and Timer</span>
        <div class="container slds-p-around_medium slds-d-flex slds-flex-column slds-align-items-center">
            <div class="display slds-card">
                <span class="time slds-text-heading_large">{elapsedTime}</span>
                <span class="mode slds-text-body_regular slds-text-color_weak" lwc:if={mode}> ({mode})</span>
            </div>
            <lightning-layout-item class="slds-m-bottom_medium">
                <lightning-layout horizontal-align="center" multiple-rows>
                    <lightning-layout-item padding="horizontal-small" class="timer-input-item">
                        <lightning-input label="Hours" type="number" value={hours} onchange={handleHoursChange}></lightning-input>
                    </lightning-layout-item>
                    <lightning-layout-item padding="horizontal-small" class="timer-input-item">
                        <lightning-input label="Minutes" type="number" value={minutes} onchange={handleMinutesChange}></lightning-input>
                    </lightning-layout-item>
                    <lightning-layout-item padding="horizontal-small" class="timer-input-item">
                        <lightning-input label="Seconds" type="number" value={seconds} onchange={handleSecondsChange}></lightning-input>
                    </lightning-layout-item>
                </lightning-layout>
            </lightning-layout-item>
           <lightning-layout-item>
                <lightning-layout horizontal-align="center" multiple-rows>
                    <lightning-layout-item padding="horizontal-small">
                        <lightning-button label={startStopwatchLabel} icon-name={stopwatchIcon} onclick={startStopwatch} disabled={isStopwatchDisabled}></lightning-button>
                    </lightning-layout-item>
                    <lightning-layout-item padding="horizontal-small">
                        <lightning-button label={startTimerLabel} icon-name={timerIcon} onclick={startTimer} disabled={isTimerDisabled}></lightning-button>
                    </lightning-layout-item>
                    <lightning-layout-item padding="horizontal-small">
                        <lightning-button label="Reset" icon-name="utility:refresh" onclick={reset}></lightning-button>
                    </lightning-layout-item>
                </lightning-layout>
            </lightning-layout-item>
        </div>
    </lightning-card>
</template>
